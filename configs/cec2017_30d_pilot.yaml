# CEC2017 30D pilot 配置模板
# 目的：验证 30D 多函数、多算法、小 runs 流水线，不作为正式论文结果。
experiment_name: cec2017_30d_pilot
benchmark: CEC2017
dimension: 30
functions: [1, 3, 5, 10, 13, 20]
algorithms:
  - PSO
  - PSO-RS
  - PSO-AW
  - ARPSO-SRR
  - AP-SRR-PSO
  - DE
runs: 5
population_size: 50
max_fes: 50000
base_seed: 20260523
record_interval: 20
output: results/raw/cec2017_30d_pilot.csv
n_jobs: 1
notes: "pilot 仅用于估算耗时、检查 CSV/summary/stats/figures 流程；不要写成正式统计结论。"
